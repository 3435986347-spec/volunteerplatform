spring:
  application:
    name: hengde-volunteer-api
  # 不在此硬编码 active profile：本地开发显式 --spring.profiles.active=dev，生产 --spring.profiles.active=prod。
  # 无 profile 启动会被 ProductionConfigGuard 拦下（避免静默以开发默认配置上线）。
  datasource:
    url: jdbc:mysql://localhost:3306/hengde_volunteer?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PWD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0        # 基线落在 0，确保 V1__init_schema 不被 baseline 当成已应用而跳过
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

sa-token:
  token-name: Authorization
  timeout: 2592000        # 30天
  active-timeout: 86400   # 活跃续签窗口 1天
  is-concurrent: true
  is-share: false
  is-read-header: true
  token-style: uuid
  is-log: false

hengde:
  sms:
    enabled: ${SMS_ENABLED:false}      # dev/test 默认关，不真发短信只打日志；生产置 true
    access-key: ${SMS_AK:}             # 留空默认，避免环境变量缺失导致启动失败
    secret-key: ${SMS_SK:}
    sign-name: 雷州市恒德爱心公益协会
    sms-account: ${SMS_ACCOUNT:}
    region: cn-north-1
    templates:
      verify-code: ${SMS_TPL_VERIFY:}  # 火山验证码模板 ID，模板占位需用 ${code}
  oss:
    provider: ${OSS_PROVIDER:aliyun}     # 存储厂商：aliyun / volc（火山引擎 TOS）；恒德实例置 volc
    enabled: ${OSS_ENABLED:false}        # dev/test 默认关，不真上传只打日志返回占位 URL；生产置 true
    endpoint: ${OSS_ENDPOINT:}           # 阿里云 https://oss-cn-xx.aliyuncs.com；火山 TOS tos-cn-xx.volces.com
    region: ${OSS_REGION:}               # 火山 TOS 必填（如 cn-beijing）；阿里云可留空
    bucket: ${OSS_BUCKET:hengde-volunteer}
    access-key-id: ${OSS_AK:}
    access-key-secret: ${OSS_SK:}
    url-prefix: ${OSS_URL_PREFIX:}       # 绑定 CDN/自定义域名时填，留空按「桶名+endpoint」拼默认域名
  wechat:
    miniapp:
      appid: ${WX_APPID:}
      secret: ${WX_SECRET:}
  auth:
    realname-enabled: ${AUTH_REALNAME_ENABLED:false}        # 腾讯云身份证二要素，关闭时放行（待密钥接入）
    wework-group-enabled: ${AUTH_WEWORK_ENABLED:false}       # 企业微信群成员校验，关闭时放行
    dev-login-enabled: ${AUTH_DEV_LOGIN_ENABLED:false}      # 开发登录(跳过微信)，仅本地联调用；生产被 ProductionConfigGuard 强制拒绝
    agreement-version: ${AUTH_AGREEMENT_VERSION:1.0}        # 志愿者协议版本，改版即升号（注册时记录到 signed_agreement_version 留痕）
    # agreement-text: 协议正文，由协会方提供正式文本后在此填入（默认占位见 AuthProperties）
    wework-group-qr-url: ${AUTH_WEWORK_QR_URL:}              # 未入群引导的群二维码地址
    init-super-admin: ${AUTH_INIT_SUPER_ADMIN:true}          # 启动时无超管则预置一个
    super-admin-username: ${AUTH_SUPER_ADMIN_USERNAME:admin} # 初始超管账号
    super-admin-password: ${AUTH_SUPER_ADMIN_PASSWORD:admin123}  # 初始超管密码，⚠️生产务必用环境变量覆盖此弱默认值
  security:
    aes-key: ${SECURITY_AES_KEY:dev-only-aes-secret-change-in-prod}    # 身份证/手机号字段加密；生产必须用环境变量覆盖
    hmac-key: ${SECURITY_HMAC_KEY:dev-only-hmac-secret-change-in-prod}  # 可查询哈希密钥；生产必须用环境变量覆盖

springdoc:
  group-configs:
    - group: volunteer
      paths-to-match: /v/**
    - group: admin
      paths-to-match: /a/**
    - group: enterprise
      paths-to-match: /e/**

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"
  level:
    com.hengde: INFO        # 生产默认 INFO；本地开发的 DEBUG 见 application-dev.yaml