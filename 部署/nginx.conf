# ============================================================
# 恒德志愿者平台 · 运营管理后台 生产 nginx 配置（方案C 分离部署）
#
# 用法：复制到服务器 /etc/nginx/conf.d/hengde-admin.conf
#       （确保主配置 /etc/nginx/nginx.conf 的 http{} 内有 include /etc/nginx/conf.d/*.conf）
#       改完后 nginx -t 校验、nginx -s reload 生效。
#
# 前置：
#   - 前端静态：把 volunteer-platform-back/ 下的 index.html + assets/ 复制到下方 root 目录
#     （只拷这两样；README/联调指南/uploads 参考文档不要上服务器，本配置也有兜底拦截）
#   - 后端：Spring Boot jar 监听 127.0.0.1:8080（context-path=/api），由 systemd 管理（见 文档/v1/部署说明.md）
#   - 前端 api.js 在 80/443 端口下自动用同源 '/api'，零前端改动、无运行期 CORS。
# ============================================================

server {
    listen 80;
    # TODO 上线前改成真实域名（如 admin.hengde.example.cn）或保持 _ 仅按 IP 访问；
    # 上 HTTPS 后本块由 certbot 自动改写（见文末）。
    server_name _;

    charset utf-8;

    # ---------- 前端静态 ----------
    root /opt/hengde/admin-web;
    index index.html;

    # 应用无 URL 路由（页面状态全在内存），不需要 SPA fallback，直接按文件匹配。
    # 静态文件名无指纹（非构建产物）：expires -1 → Cache-Control: no-cache + ETag 协商缓存，
    # 每次发版浏览器重新验证（命中 304 极快），避免长缓存导致改版后页面/脚本不同步。
    location / {
        try_files $uri $uri/ =404;
        expires -1;
    }

    # ---------- 后端反代 ----------
    # 后端 context-path 即 /api：proxy_pass 不带 URI 部分 → 原样透传 /api/xxx 给后端。
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 覆盖式（非 $proxy_add_x_forwarded_for 追加式）：丢弃客户端伪造的 XFF 链，
        # 后端 IpUtil 据此做 IP 限流（短信发送/登录防爆破），不能让计数键被伪造头随意换
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Sa-Token 走 Authorization 请求头，nginx 默认透传，无需特殊配置
        proxy_read_timeout 60s;    # Excel 导出等慢接口余量
    }

    # 生产屏蔽接口文档（Knife4j/springdoc）。本地联调直连 :8080 不经 nginx，不受影响。
    location ~ ^/api/(doc\.html|webjars/|v3/api-docs|swagger) {
        deny all;
    }

    # 上传链路大小三层对齐：nginx 16m > Spring multipart 12MB > 业务校验 FileValidator 10MB（友好报错先生效）
    client_max_body_size 16m;

    # ---------- 安全头 ----------
    # 注意：nginx 的 add_header 在 location 内一旦出现会屏蔽外层继承——上面各 location 均未写
    # add_header，故以下三条对全部响应生效；后续在 location 内加 add_header 时须把这三条带上。
    add_header X-Content-Type-Options "nosniff" always;   # 前端脚本已统一 .js 后缀，MIME 正确（M5 硬化）
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 暂不加 CSP：index.html 有内联脚本（__API_BASE__/hooks 别名）需 'unsafe-inline'，收益有限；
    # 若要上 CSP，先把内联脚本外置成文件再配。

    # 兜底拦截：隐藏文件、文档/sourcemap、uploads 参考资料目录（万一被一起拷上服务器也不可达）
    location ~ /\. { deny all; }
    location ~* \.(md|map)$ { deny all; }
    location ^~ /uploads/ { deny all; }

    # ---------- 压缩 ----------
    gzip on;
    gzip_types text/css application/javascript text/javascript application/json image/svg+xml;
    gzip_min_length 1k;
    gzip_comp_level 5;
    gzip_vary on;
}

# ============================================================
# HTTPS（有域名后启用，推荐 certbot 自动签发与续期）：
#   1) dnf/apt 安装 certbot python3-certbot-nginx
#   2) certbot --nginx -d <域名>   ← 自动改写本配置：加 443 ssl 块 + 80 端口 301 跳转
#   3) systemctl enable --now certbot-renew.timer（自动续期）
# 前端无需任何改动（api.js 对 443 同样走同源 '/api'）。
# ============================================================
