<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恒德志愿者平台 · 运营管理后台</title>
<link rel="stylesheet" href="assets/styles.css">
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" rx="20" fill="#1677ff"/>
<rect x="30" y="30" width="40" height="40" rx="8" fill="#fff"/>
<text x="50" y="57" font-size="18" font-weight="700" fill="#1677ff" text-anchor="middle" font-family="sans-serif">恒</text>
</svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- 全局数据 + 权限模型（plain） -->
<script src="assets/data.js"></script>
<!-- 真实接口基址：经 nginx 同源反代(80/443)用 '/api'；本地静态服务器(其它端口)直连后端 8080(CORS 已开) -->
<script>
  window.__API_BASE__ = (location.port === '' || location.port === '80' || location.port === '443')
    ? '/api'
    : 'http://localhost:8080/api';
</script>
<!-- 真实接口封装（统一 /api 前缀、Sa-Token、{code,message,data}、401、上传） -->
<script src="assets/api.js"></script>
<!-- 地图选点（可选）：填入高德 Web 端 JS API key 后启用真实地图；留空则用示意选点。
     2021-12-02 后申请的 key 必须配安全密钥：本地/简单部署填 __AMAP_SECURITY_CODE__（安全密钥 jscode）；
     生产推荐改用代理，填 __AMAP_SERVICE_HOST__（你的代理地址，优先级高于安全密钥）。 -->
<script>
  window.__AMAP_KEY__ = '';
  window.__AMAP_SECURITY_CODE__ = '';
  window.__AMAP_SERVICE_HOST__ = '';
</script>
<!-- 共享 hooks 全局别名（plain，须在 babel 脚本之前） -->
<script>
  var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef,
      useCallback = React.useCallback, createContext = React.createContext, useContext = React.useContext;
</script>

<!-- UI 与页面（babel） -->
<script type="text/babel" src="assets/icons.jsx"></script>
<script type="text/babel" src="assets/ui-core.jsx"></script>
<script type="text/babel" src="assets/ui-overlay.jsx"></script>
<script type="text/babel" src="assets/ui-upload.jsx"></script>
<script type="text/babel" src="assets/tweaks-panel.jsx"></script>
<script type="text/babel" src="assets/shell.jsx"></script>
<script type="text/babel" src="assets/page-overview.jsx"></script>
<script type="text/babel" src="assets/page-volunteers.jsx"></script>
<script type="text/babel" src="assets/page-activities.jsx"></script>
<script type="text/babel" src="assets/page-activity-review.jsx"></script>
<script type="text/babel" src="assets/page-enroll.jsx"></script>
<script type="text/babel" src="assets/page-audit.jsx"></script>
<script type="text/babel" src="assets/page-org.jsx"></script>
<script type="text/babel" src="assets/page-org2.jsx"></script>
<script type="text/babel" src="assets/page-publicity.jsx"></script>
<script type="text/babel" src="assets/app.jsx"></script>
</body>
</html>
