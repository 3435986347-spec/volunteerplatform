<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恒德志愿者平台 · 运营管理后台</title>
<link rel="stylesheet" href="assets/styles.css">
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" rx="20" fill="#1677ff"/>
<rect x="30" y="30" width="40" height="40" rx="8" fill="#fff"/>
<text x="50" y="57" font-size="18" font-weight="700" fill="#1677ff" text-anchor="middle" font-family="sans-serif">恒</text>
</svg>
</template>
</head>
<body>
<div id="root"></div>

<!-- React 生产版（本地 vendor）：M5 生产硬化已去掉 unpkg CDN 与运行期 @babel/standalone；
     全部 assets/*.js 均为纯 React.createElement，以普通 <script> 加载（见下）。 -->
<script src="assets/vendor/react.production.min.js"></script>
<script src="assets/vendor/react-dom.production.min.js"></script>

<!-- 前端权限模型 + 预览身份（plain，须在页面脚本之前） -->
<script src="assets/authz.js"></script>
<script src="assets/preview-identities.js"></script>
<!-- 真实接口基址：经 nginx 同源反代(80/443)用 '/api'；本地静态服务器(其它端口)直连后端 8080(CORS 已开) -->
<script>
  window.__API_BASE__ = (location.port === '' || location.port === '80' || location.port === '443')
    ? '/api'
    : 'http://localhost:8080/api';
</script>
<!-- 真实接口封装（统一 /api 前缀、Sa-Token、{code,message,data}、401、上传） -->
<script src="assets/api.js"></script>
<!-- 地图选点（可选）：填入高德 Web 端 JS API key 后启用真实地图；留空则用示意选点。
     2021-12-02 后申请的 key 必须配安全密钥：本地/简单部署填 __AMAP_SECURITY_CODE__（安全密钥 jscode）；
     生产推荐改用代理，填 __AMAP_SERVICE_HOST__（你的代理地址，优先级高于安全密钥）。 -->
<script>
  window.__AMAP_KEY__ = '';
  window.__AMAP_SECURITY_CODE__ = '';
  window.__AMAP_SERVICE_HOST__ = '';
</script>
<!-- 共享 hooks 全局别名（plain，须在 React 之后、页面脚本之前） -->
<script>
  var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef,
      useCallback = React.useCallback, createContext = React.createContext, useContext = React.useContext;
</script>

<!-- UI 与页面（普通脚本；已去 Babel，文件均为纯 React.createElement） -->
<script src="assets/icons.js"></script>
<script src="assets/ui-core.js"></script>
<script src="assets/ui-overlay.js"></script>
<script src="assets/ui-upload.js"></script>
<script src="assets/tweaks-panel.js"></script>
<script src="assets/shell.js"></script>
<script src="assets/page-overview.js"></script>
<script src="assets/page-volunteers.js"></script>
<script src="assets/page-activities.js"></script>
<script src="assets/page-activity-review.js"></script>
<script src="assets/page-enroll.js"></script>
<script src="assets/page-audit.js"></script>
<script src="assets/page-org.js"></script>
<script src="assets/page-org2.js"></script>
<script src="assets/page-publicity.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
